<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MomentumAI Job Analyzer</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        background: #020617;
        color: #f8fafc;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        padding: 16px;
      }
      .badge {
        display: inline-flex;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(99, 102, 241, 0.18);
        color: #c7d2fe;
        font-size: 11px;
        font-weight: 700;
      }
      h1 {
        margin: 12px 0 8px;
        font-size: 20px;
        letter-spacing: -0.04em;
      }
      p {
        color: #94a3b8;
        font-size: 13px;
        line-height: 1.5;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 14px;
        margin-top: 12px;
        padding: 12px 14px;
        color: white;
        background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
        font-weight: 800;
        cursor: pointer;
      }
      textarea {
        width: 100%;
        min-height: 92px;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        padding: 10px;
        color: #e2e8f0;
        background: rgba(255, 255, 255, 0.06);
        resize: vertical;
      }
      small {
        display: block;
        margin-top: 10px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">MomentumAI</span>
      <h1>Analyze this job</h1>
      <p>Capture the current careers page and open it in MomentumAI's smart importer.</p>
      <textarea id="notes" placeholder="Optional notes, recruiter context, salary info..."></textarea>
      <button id="analyze">Analyze in MomentumAI</button>
      <small>Local MVP target: http://localhost:5173. Production can point to the hosted app URL.</small>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
